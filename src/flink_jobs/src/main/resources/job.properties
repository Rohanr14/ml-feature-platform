# ── Kafka ──
kafka.bootstrap-servers=localhost:9092
kafka.input-topic=raw-transactions
kafka.group-id=flink-feature-pipeline

# ── Output ──
# For local dev, use filesystem. For prod, use s3a://ml-feature-platform/streaming/enriched/
output.path=/tmp/ml-platform/streaming/enriched

