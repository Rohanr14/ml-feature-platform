model:
  input_dim: 16
  hidden_dim: 64
  num_heads: 4
  dropout: 0.1

training:
  epochs: 50
  batch_size: 256
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 5

data:
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  feast_feature_views:
    - user_daily_features
    - user_rolling_features
